<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f6f7; color:#1a1a1a; min-height:100vh; }

  .nav-back{ border:none; background:none; cursor:pointer; font-size:20px; color:#aaa; padding:0; line-height:1; }
  .nav-title{ font-size:15px; font-weight:600; color:#1a1a1a; }
  .menu-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .menu-btn{ padding:16px 12px; border-radius:12px; border:0.5px solid #e0e0e0; background:#fff; cursor:pointer; text-align:left; }

  .textarea{ width:100%; padding:10px 12px; border-radius:8px; font-size:13px; border:0.5px solid #ddd; background:#fff; color:#1a1a1a; resize:vertical; min-height:100px; font-family:inherit; line-height:1.6; box-sizing:border-box; }
  .btn{ width:100%; padding:12px; border-radius:10px; font-size:14px; font-weight:500; border:none; cursor:pointer; }
  .btn-dark{ background:#1a1a1a; color:#fff; }
  .btn-purple{ background:#7E22CE; color:#fff; }
  .btn-outline{ background:none; border:0.5px solid #ddd; color:#888; }
  .bdg{ display:inline-block; font-size:11px; font-weight:500; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .msg-card{ background:#fff; border:0.5px solid #e8e8e8; border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .row-between{ display:flex; align-items:center; justify-content:space-between; }
  .status-done{ background:#F0FDF4; color:#15803D; }
  .status-read{ background:#FFFBEB; color:#B45309; }
  .status-unread{ background:#FEF2F2; color:#B91C1C; }
  .pin-dots{ display:flex; justify-content:center; gap:20px; margin-bottom:36px; }
  .pin-dot{ width:18px; height:18px; border-radius:50%; border:2px solid #ccc; background:transparent; transition:all .15s; }
  .pin-dot.filled{ background:#1a1a1a; border-color:#1a1a1a; }
  .keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto; }
  .key-btn{ height:64px; border-radius:14px; border:0.5px solid #e0e0e0; background:#fff; font-size:20px; font-weight:500; cursor:pointer; touch-action:manipulation; }

  .key-del{ font-size:18px; }

  .err{ font-size:11px; color:#EF4444; min-height:16px; }

<body>
<div class="page" id="app"></div>

<script>
// ================================================================
// ⚙️  GAS 연동 설정 — 아래 URL 과 TOKEN 을 실제 값으로 교체하세요
// ================================================================
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbz35TSOHShPq0EjpUs-0Ku67nur7yqdepKgXVu5HUEzxN5smSapxRZrpiSbTvCSJ89e/exec';
const GAS_TOKEN = 'pab2024';

// ── GAS 통신 유틸리티 (GET 방식 통일 · CORS 문제 해결) ──
// 이 코드 블록을 index.html과 admin.html 양쪽 <script>에 포함

const GAS = {

  // ── GET 요청 (읽기) ──
  async get(action) {
    const url = `${GAS_URL}?action=${action}&token=${GAS_TOKEN}&t=${Date.now()}`;
    try {
      const r = await fetch(url, {
        method: 'GET',
        redirect: 'follow',
        cache: 'no-store',
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'GAS error');
      return j.data;
    } catch(e) {
      console.warn(`[GAS.get] ${action} 실패:`, e.message);
      return null;
    }
  },

  // ── GET 방식 저장 (POST 대신 GET + payload 파라미터) ──
  async save(action, data) {
    const payload = encodeURIComponent(JSON.stringify(data));
    // URL 길이 제한(~8000자) 초과 시 청크 분할 저장
    if (payload.length > 6000) {
      return GAS._saveChunked(action, data);
    }
    const url = `${GAS_URL}?action=${action}&token=${GAS_TOKEN}&payload=${payload}&t=${Date.now()}`;
    try {
      const r = await fetch(url, {
        method: 'GET',
        redirect: 'follow',
        cache: 'no-store',
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      return !!j.ok;
    } catch(e) {
      // GET 실패 시 POST fallback
      console.warn(`[GAS.save] GET 실패, POST fallback:`, e.message);
      return GAS._savePost(action, data);
    }
  },

  // ── POST fallback ──
  async _savePost(action, data) {
    try {
      const r = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action, data, token: GAS_TOKEN }),
        redirect: 'follow',
      });
      const j = await r.json();
      return !!j.ok;
    } catch(e) {
      console.warn(`[GAS.save] POST도 실패:`, e.message);
      return false;
    }
  },

  // ── 청크 저장 (데이터가 클 경우) ──
  async _saveChunked(action, data) {
    // 전체를 POST로 처리 (청크 분할보다 안정적)
    return GAS._savePost(action, data);
  },

  // ── 연결 테스트 ──
  async ping() {
    const url = `${GAS_URL}?action=ping&token=${GAS_TOKEN}&t=${Date.now()}`;
    try {
      const r = await fetch(url, { method:'GET', redirect:'follow', cache:'no-store' });
      const j = await r.json();
      return j.ok ? j.ts : null;
    } catch(e) {
      return null;
    }
  },
};


// ── 상수 ──
const HKEY     = 'pab-admin-pbkdf2';
const MKEY     = 'pab-inbox-v2';
const NKEY     = 'pab-notices-v2';
const SKEY     = 'pab-settings-v2';
const PIN_SALT = 'pab_pin_2025';
const ITER     = 100000;

const ROLES = {
  morning:   { l:'오전 매니저님', bg:'#EFF6FF', tx:'#1D4ED8', init:'오전' },
  afternoon: { l:'오후 매니저님', bg:'#F0FDF4', tx:'#15803D', init:'오후' },
  evening:   { l:'저녁 매니저님', bg:'#FFFBEB', tx:'#B45309', init:'저녁' },
};
const TYPES = {
  handover:{ l:'전달사항', bg:'#F0FDF4', tx:'#15803D' },
  caution: { l:'주의사항', bg:'#FEF2F2', tx:'#B91C1C' },
};
const ALL = ['morning','afternoon','evening'];

// ── 상태 ──
let isAuth=false, view='auth', msgs=[], notices=[], settings={pins:{}};

// ── GAS ──
async function gasGet(action){ return GAS.get(action); }
async function gasPost(action, data){ return GAS.save(action, data); }
async function gasPing(){ return GAS.ping(); }

function saveLocal(k,d){ try{localStorage.setItem(k,JSON.stringify(d));}catch(e){} }
function loadLocal(k,def){ try{const s=localStorage.getItem(k);if(s){const p=JSON.parse(s);if(p!=null)return p;}}catch(e){} return def; }

async function loadAll(){
  const [m,n,s]=await Promise.all([gasGet('getMsgs'),gasGet('getNotices'),gasGet('getSettings')]);
  if(m){ msgs=m; saveLocal(MKEY,m); } else msgs=loadLocal(MKEY,[]);
  if(n){ notices=n; saveLocal(NKEY,n); } else notices=loadLocal(NKEY,[]);
  if(s){ settings=s; saveLocal(SKEY,s); } else settings=loadLocal(SKEY,{pins:{}});
  if(!settings.pins) settings.pins={};
}

// ── PBKDF2 (관리자 비밀번호) ──
async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,256);
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPw(pw){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const hash=await deriveKey(pw,salt);
  const saltHex=Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join('');
  return saltHex+':'+hash;
}
async function verifyPw(pw,stored){
  const[saltHex,storedHash]=stored.split(':');
  const salt=new Uint8Array(saltHex.match(/.{2}/g).map(b=>parseInt(b,16)));
  return await deriveKey(pw,salt)===storedHash;
}

// ── PIN 해시 (SHA-256) ──
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+PIN_SALT));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── 포맷 ──
function fmt(iso){
  const d=new Date(iso),diff=Date.now()-d;
  if(diff<3600000) return Math.floor(diff/60000)+'분 전';
  if(diff<86400000) return Math.floor(diff/3600000)+'시간 전';
  if(diff<172800000) return '어제 '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function bdgHtml(bg,tx,txt){ return `<span class="bdg" style="background:${bg};color:${tx};">${txt}</span>`; }

// ════════════════════════════════
//  화면 렌더러
// ════════════════════════════════

function renderAuth(){
  const hasHash=!!localStorage.getItem(HKEY);
  if(!hasHash){
    return `<div style="text-align:center;padding:60px 0 40px;">
      <div style="font-size:36px;margin-bottom:16px;">🔐</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:6px;">관리자 비밀번호 설정</div>
      <div style="font-size:13px;color:#888;margin-bottom:32px;">최초 1회 설정이 필요합니다</div>
    </div>
    <div class="card">
      <div style="margin-bottom:12px;"><div class="sec-label">새 비밀번호 (4자 이상)</div><input type="password" id="pw1" class="input" placeholder="비밀번호 입력"/></div>
      <div style="margin-bottom:16px;"><div class="sec-label">비밀번호 확인</div><input type="password" id="pw2" class="input" placeholder="비밀번호 재입력"/></div>
      <div id="auth-err" class="err" style="margin-bottom:8px;"></div>
      <button class="btn btn-dark" id="btn-setup">설정 완료</button>
    </div>`;
  }
  return `<div style="text-align:center;padding:60px 0 40px;">
    <div style="font-size:36px;margin-bottom:16px;">🔐</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:4px;">PAB 관리자</div>
    <div style="font-size:13px;color:#888;margin-bottom:32px;">비밀번호를 입력해 주세요</div>
  </div>
  <div class="card">
    <div style="margin-bottom:16px;"><input type="password" id="pw" class="input" placeholder="비밀번호"/></div>
    <div id="auth-err" class="err" style="margin-bottom:8px;"></div>
    <button class="btn btn-dark" id="btn-login" style="margin-bottom:10px;">로그인</button>
    <div style="text-align:center;"><button id="btn-reset-pw" style="font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;text-decoration:underline;">비밀번호 초기화</button></div>
  </div>`;
}

function renderMain(){
  const managerMsgs=msgs.filter(m=>ALL.indexOf(m.from)>=0&&m.to!=='leader');
  const unproc=managerMsgs.filter(m=>ALL.some(r=>m.status&&(m.status[r]==='unread'||m.status[r]==='read'))).length;
  const toLeader=msgs.filter(m=>m.to==='leader'&&ALL.indexOf(m.from)>=0);
  const activeN=notices.filter(n=>n.active!==false).length;
  const newToLeader=toLeader.filter(m=>!m.leaderRead).length;

  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <div style="font-size:18px;font-weight:700;color:#1a1a1a;">PAB 관리자</div>
      <div style="font-size:11px;color:#888;margin-top:2px;">${new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})}</div>
    </div>
    <button id="btn-lock" style="font-size:11px;padding:6px 14px;border-radius:8px;border:0.5px solid #ddd;background:none;color:#888;cursor:pointer;">잠금</button>
  </div>
  <div class="menu-grid" style="margin-bottom:12px;">
    <button class="menu-btn" data-view="monitor">
      <div class="menu-btn-label">매니저 소통 현황</div>
      <div class="menu-btn-val">${managerMsgs.length}</div>
      <div class="menu-btn-sub" style="color:#EF4444;">미처리 ${unproc}건</div>
    </button>
    <button class="menu-btn" data-view="direct">
      <div class="menu-btn-label">나에게 온 메시지</div>
      <div class="menu-btn-val">${toLeader.length}</div>
      <div class="menu-btn-sub" style="color:${newToLeader?'#EF4444':'#888'};">미확인 ${newToLeader}건</div>
    </button>
  </div>
  <div class="menu-grid" style="margin-bottom:20px;">
    <button class="menu-btn" data-view="compose">
      <div class="menu-btn-label">매니저에게 발신</div>
      <div class="menu-btn-val" style="font-size:26px;">✉</div>
      <div class="menu-btn-sub" style="color:#888;">메시지 작성</div>
    </button>
    <button class="menu-btn" data-view="notice">
      <div class="menu-btn-label">전체 공고</div>
      <div class="menu-btn-val">${activeN}</div>
      <div class="menu-btn-sub" style="color:#7E22CE;">게시 중</div>
    </button>
  </div>
  <button class="menu-btn" data-view="pins" style="width:100%;margin-bottom:12px;">
    <div class="menu-btn-label">매니저 PIN 관리</div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      ${ALL.map(r=>{const set=!!(settings.pins&&settings.pins[r]);return`<span style="font-size:11px;padding:2px 8px;border-radius:6px;background:${set?'#F0FDF4':'#FEF2F2'};color:${set?'#15803D':'#B91C1C'};">${ROLES[r].init} ${set?'설정됨':'미설정'}</span>`;}).join('')}
    </div>
  </button>
  <div style="margin-top:16px;border-top:0.5px solid #eee;padding-top:12px;text-align:right;">
    <button data-view="change-pw" style="font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;text-decoration:underline;">비밀번호 변경</button>
  </div>`;
}

function renderMonitor(){
  const all=msgs.filter(m=>ALL.indexOf(m.from)>=0&&m.to!=='leader').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const stC={done:'status-done',read:'status-read',unread:'status-unread'};
  const stL={done:'✓ 처리완료',read:'○ 확인함',unread:'● 미확인'};
  let h=`<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">매니저 소통 현황 전체</div></div>`;
  if(!all.length) h+=`<div style="text-align:center;padding:48px;color:#bbb;font-size:13px;">전달 메시지가 없습니다.</div>`;
  else all.forEach(m=>{
    const rf=ROLES[m.from]||{bg:'#f5f6f7',tx:'#333',l:m.from};
    const tp=TYPES[m.type]||{bg:'#f5f6f7',tx:'#333',l:m.type};
    const toL=m.to==='all'?'전체':(ROLES[m.to]?ROLES[m.to].l:m.to);
    const rList=(m.to==='all'?ALL:[m.to]).filter(r=>r!==m.from);
    h+=`<div class="msg-card">
      <div class="row-between" style="margin-bottom:6px;gap:8px;">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">${bdgHtml(rf.bg,rf.tx,rf.l)}<span style="font-size:11px;color:#bbb;">→ ${toL}</span>${bdgHtml(tp.bg,tp.tx,tp.l)}</div>
        <span style="font-size:11px;color:#bbb;flex-shrink:0;">${fmt(m.createdAt)}</span>
      </div>
      <p style="font-size:13px;color:#1a1a1a;line-height:1.65;margin:0 0 8px;white-space:pre-wrap;">${esc(m.content)}</p>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        ${rList.map(r=>{const st=m.status&&m.status[r]?m.status[r]:'unread';return`<span class="bdg ${stC[st]||stC.unread}" style="font-size:10px;padding:2px 8px;border-radius:4px;">${ROLES[r]?ROLES[r].l:r} ${stL[st]||stL.unread}</span>`;}).join('')}
      </div>
    </div>`;
  });
  return h;
}

function renderDirect(){
  const direct=msgs.filter(m=>m.to==='leader'&&ALL.indexOf(m.from)>=0).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  let h=`<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">나에게 온 메시지 (${direct.length}건)</div></div>`;
  if(!direct.length) h+=`<div style="text-align:center;padding:48px;color:#bbb;font-size:13px;">받은 메시지가 없습니다.</div>`;
  else direct.forEach(m=>{
    const rf=ROLES[m.from]||{bg:'#f5f6f7',tx:'#333',l:m.from};
    const tp=TYPES[m.type]||{bg:'#f5f6f7',tx:'#333',l:m.type};
    h+=`<div class="msg-card">
      <div class="row-between" style="margin-bottom:6px;gap:8px;">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">${bdgHtml(rf.bg,rf.tx,rf.l)}<span style="font-size:11px;color:#bbb;">→ 팀장님</span>${bdgHtml(tp.bg,tp.tx,tp.l)}</div>
        <span style="font-size:11px;color:#bbb;flex-shrink:0;">${fmt(m.createdAt)}</span>
      </div>
      <p style="font-size:13px;color:#1a1a1a;line-height:1.65;margin:0;white-space:pre-wrap;">${esc(m.content)}</p>
    </div>`;
  });
  return h;
}

function renderCompose(){
  return `<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">매니저에게 메시지 발신</div></div>
  <div class="card">
    <div style="margin-bottom:12px;"><div class="sec-label">받는 사람</div>
      <select id="comp-to" class="input">
        <option value="all">전체 매니저님</option>
        ${ALL.map(k=>`<option value="${k}">${ROLES[k].l}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:12px;"><div class="sec-label">유형</div>
      <select id="comp-type" class="input">
        <option value="handover">전달사항</option><option value="caution">주의사항</option>
      </select>
    </div>
    <div style="margin-bottom:16px;"><div class="sec-label">내용</div>
      <textarea id="comp-content" class="textarea" placeholder="메시지 내용을 입력하세요..."></textarea>
    </div>
    <div id="comp-err" class="err" style="margin-bottom:8px;"></div>
    <button class="btn btn-dark" id="btn-send">전송하기</button>
  </div>`;
}

function renderNotice(){
  const active=notices.filter(n=>n.active!==false).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const archived=notices.filter(n=>n.active===false).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  let h=`<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">전체 공고 관리</div></div>
  <div class="card" style="background:#faf9fe;border-color:#e4e0f0;">
    <div style="font-size:12px;font-weight:500;margin-bottom:10px;">새 공고 게시</div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:8px;">
      <select id="n-type" class="input" style="font-size:12px;padding:7px 10px;">
        <option value="notice">일반 공지</option><option value="policy">정책 공지</option>
      </select>
      <input type="text" id="n-title" class="input" style="font-size:12px;padding:7px 10px;" placeholder="제목 (선택)"/>
    </div>
    <textarea id="n-content" class="textarea" style="min-height:80px;font-size:12px;margin-bottom:8px;" placeholder="공고 내용...&#10;줄바꿈 그대로 표시됩니다."></textarea>
    <button class="btn btn-purple" id="btn-npost">게시하기</button>
  </div>
  <div class="sec-label">게시 중 · ${active.length}건</div>`;
  if(!active.length) h+=`<div style="text-align:center;padding:14px;color:#bbb;font-size:12px;">없음</div>`;
  else active.forEach(n=>{
    const ntBg=n.type==='policy'?'#FAF5FF':'#EFF6FF', ntTx=n.type==='policy'?'#7E22CE':'#1D4ED8';
    const ntL=n.type==='policy'?'정책 공지':'일반 공지';
    h+=`<div class="msg-card">
      <div class="row-between" style="margin-bottom:5px;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span class="notice-chip" style="background:${ntBg};color:${ntTx};">${ntL}</span>
          ${n.title?`<span style="font-size:12px;font-weight:500;">${esc(n.title)}</span>`:''}
        </div>
        <button data-archive="${n.id}" style="font-size:10px;padding:2px 8px;border-radius:4px;background:none;border:0.5px solid #ddd;color:#aaa;cursor:pointer;">내리기</button>
      </div>
      <div style="font-size:12px;color:#333;line-height:1.6;white-space:pre-wrap;">${esc(n.content)}</div>
      <div style="font-size:10px;color:#bbb;margin-top:5px;">${fmt(n.createdAt)}</div>
    </div>`;
  });
  if(archived.length){
    h+=`<div class="sec-label" style="margin-top:12px;">내려간 공고 · ${archived.length}건</div>`;
    archived.slice(0,5).forEach(n=>{
      h+=`<div style="background:#f9f9f9;border:0.5px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:6px;opacity:.5;">
        <div style="font-size:12px;color:#888;">${esc(n.title||n.content.slice(0,30))}</div>
        <div style="font-size:10px;color:#bbb;margin-top:3px;">${fmt(n.createdAt)}</div>
      </div>`;
    });
  }
  return h;
}

function renderPins(){
  let h=`<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">매니저 PIN 관리</div></div>
  <div class="card" style="background:#EFF6FF;border-color:#BFDBFE;margin-bottom:16px;">
    <div style="font-size:12px;color:#1D4ED8;line-height:1.6;">각 매니저님의 4자리 PIN을 설정하세요.<br>설정 후 매니저 앱에서 역할 선택 시 PIN이 요구됩니다.</div>
  </div>`;
  ALL.forEach(r=>{
    const v=ROLES[r];
    const hasPin=!!(settings.pins&&settings.pins[r]);
    h+=`<div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:36px;height:36px;border-radius:50%;background:${v.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:${v.tx};">${v.init}</div>
        <div>
          <div style="font-size:13px;font-weight:500;">${v.l}</div>
          <div style="font-size:11px;color:${hasPin?'#15803D':'#B91C1C'};">${hasPin?'🔒 PIN 설정됨':'⚠ PIN 미설정 (자유 진입)'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="password" id="pin-${r}" class="input" style="flex:1;font-size:14px;letter-spacing:4px;" maxlength="4" placeholder="새 PIN (4자리)" inputmode="numeric"/>
        <button data-set-pin="${r}" style="padding:10px 16px;border-radius:8px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;">설정</button>
      </div>
      ${hasPin?`<button data-clear-pin="${r}" style="margin-top:8px;font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;text-decoration:underline;">PIN 초기화</button>`:''}
    </div>`;
  });
  h+=`<div id="pin-msg" class="err" style="text-align:center;margin-top:8px;"></div>`;
  return h;
}

function renderChangePw(){
  return `<div class="nav"><button class="nav-back" data-view="main">←</button><div class="nav-title">비밀번호 변경</div></div>
  <div class="card">
    <div style="margin-bottom:10px;"><div class="sec-label">현재 비밀번호</div><input type="password" id="old-pw" class="input"/></div>
    <div style="margin-bottom:10px;"><div class="sec-label">새 비밀번호 (4자 이상)</div><input type="password" id="new-pw1" class="input"/></div>
    <div style="margin-bottom:16px;"><div class="sec-label">새 비밀번호 확인</div><input type="password" id="new-pw2" class="input"/></div>
    <div id="chpw-err" class="err" style="margin-bottom:8px;"></div>
    <button class="btn btn-dark" id="btn-chpw">변경 완료</button>
  </div>`;
}

// ════════════════════════════════
//  메인 렌더 + 이벤트
// ════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(!app) return;
  if(!isAuth){ app.innerHTML=renderAuth(); bindAuth(); return; }
  switch(view){
    case 'main':      app.innerHTML=renderMain();    break;
    case 'monitor':   app.innerHTML=renderMonitor(); break;
    case 'direct':    app.innerHTML=renderDirect();  break;
    case 'compose':   app.innerHTML=renderCompose(); break;
    case 'notice':    app.innerHTML=renderNotice();  break;
    case 'pins':      app.innerHTML=renderPins();    break;
    case 'change-pw': app.innerHTML=renderChangePw();break;
    default:          app.innerHTML=renderMain();
  }
  bindMain();
}

function bindAuth(){
  const app=document.getElementById('app');
  app.querySelector('#btn-setup')?.addEventListener('click',async()=>{
    const p1=(app.querySelector('#pw1')||{value:''}).value;
    const p2=(app.querySelector('#pw2')||{value:''}).value;
    const err=app.querySelector('#auth-err');
    if(p1.length<4){ err.textContent='4자 이상 입력해 주세요.'; return; }
    if(p1!==p2){ err.textContent='비밀번호가 일치하지 않습니다.'; return; }
    err.textContent='설정 중...'; err.style.color='#F59E0B';
    const h=await hashPw(p1);
    localStorage.setItem(HKEY,h);
    isAuth=true; view='main';
    await loadAll(); render();
  });
  const loginBtn=app.querySelector('#btn-login');
  loginBtn?.addEventListener('click',async()=>{
    const pw=(app.querySelector('#pw')||{value:''}).value;
    const err=app.querySelector('#auth-err');
    if(!pw){ err.textContent='비밀번호를 입력해 주세요.'; return; }
    err.textContent='확인 중...'; err.style.color='#F59E0B';
    const stored=localStorage.getItem(HKEY);
    const ok=await verifyPw(pw,stored);
    if(ok){ isAuth=true; view='main'; await loadAll(); render(); }
    else{ err.textContent='비밀번호가 올바르지 않습니다.'; err.style.color='#EF4444'; }
  });
  app.querySelector('#pw')?.addEventListener('keydown',e=>{ if(e.key==='Enter'&&loginBtn) loginBtn.click(); });
  app.querySelector('#btn-reset-pw')?.addEventListener('click',()=>{
    if(confirm('비밀번호를 초기화하시겠습니까?\n재설정 화면으로 이동합니다.')){
      localStorage.removeItem(HKEY); render();
    }
  });
}

function bindMain(){
  const app=document.getElementById('app');

  // 뷰 이동
  app.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click',()=>{ view=btn.dataset.view; render(); });
  });
  app.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click',()=>{ view=btn.dataset.view; render(); });
  });

  // 잠금
  app.querySelector('#btn-lock')?.addEventListener('click',()=>{ isAuth=false; view='auth'; render(); });

  // 발신
  app.querySelector('#btn-send')?.addEventListener('click',()=>{
    const content=(app.querySelector('#comp-content')||{value:''}).value.trim();
    const errEl=app.querySelector('#comp-err');
    if(!content){ errEl.textContent='내용을 입력해 주세요.'; return; }
    const to=(app.querySelector('#comp-to')||{value:'all'}).value;
    const type=(app.querySelector('#comp-type')||{value:'handover'}).value;
    const rList=to==='all'?ALL:(ALL.indexOf(to)>=0?[to]:[]);
    const status={}; ALL.forEach(r=>{ status[r]=rList.indexOf(r)>=0?'unread':null; });
    msgs=[{id:Date.now()+'',type,from:'leader',to,content,createdAt:new Date().toISOString(),status},...msgs];
    saveLocal(MKEY,msgs);
    view='main'; render();
    gasPost('saveMsgs',msgs).then(ok=>{
      const msg2=document.createElement('div');
      msg2.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;';
      msg2.style.background=ok?'#1a1a1a':'#EF4444';
      msg2.style.color='#fff';
      msg2.textContent=ok?'✅ 전송 완료 — 매니저 수신함에 전달됩니다':'❌ 전송 실패 — GAS URL 확인 필요';
      document.body.appendChild(msg2);
      setTimeout(()=>msg2.remove(),3000);
    });
  });

  // 공고 게시
  app.querySelector('#btn-npost')?.addEventListener('click',()=>{
    const content=(app.querySelector('#n-content')||{value:''}).value.trim();
    if(!content) return;
    const type=(app.querySelector('#n-type')||{value:'notice'}).value;
    const title=(app.querySelector('#n-title')||{value:''}).value.trim();
    notices=[{id:Date.now()+'',type,title,content,createdAt:new Date().toISOString(),active:true},...notices];
    saveLocal(NKEY,notices);
    render(); // 즉시 화면 갱신
    gasPost('saveNotices',notices).then(ok=>{
      const msg=document.createElement('div');
      msg.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;';
      msg.style.background=ok?'#1a1a1a':'#EF4444';
      msg.style.color='#fff';
      msg.textContent=ok?'✅ 공고 게시 완료 — 매니저 앱에 반영됩니다':'❌ 저장 실패 — GAS URL 확인 필요';
      document.body.appendChild(msg);
      setTimeout(()=>msg.remove(),3000);
    });
  });

  // 공고 내리기
  app.querySelectorAll('[data-archive]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.archive;
      notices=notices.map(n=>n.id===id?{...n,active:false}:n);
      saveLocal(NKEY,notices); gasPost('saveNotices',notices); render();
    });
  });

  // PIN 설정
  app.querySelectorAll('[data-set-pin]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const role=btn.dataset.setPin;
      const pin=(app.querySelector('#pin-'+role)||{value:''}).value.trim();
      const msg=app.querySelector('#pin-msg');
      if(!/^\d{4}$/.test(pin)){ if(msg){msg.textContent='4자리 숫자를 입력해 주세요.';msg.style.color='#EF4444';} return; }
      const h=await hashPin(pin);
      if(!settings.pins) settings.pins={};
      settings.pins[role]=h;
      saveLocal(SKEY,settings); await gasPost('saveSettings',settings);
      if(msg){msg.textContent='✅ '+ROLES[role].l+' PIN 설정 완료!';msg.style.color='#15803D';}
      setTimeout(()=>render(),800);
    });
  });

  // PIN 초기화
  app.querySelectorAll('[data-clear-pin]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const role=btn.dataset.clearPin;
      if(confirm(ROLES[role].l+' PIN을 초기화하시겠습니까?')){
        if(settings.pins) settings.pins[role]='';
        saveLocal(SKEY,settings); gasPost('saveSettings',settings); render();
      }
    });
  });

  // 비밀번호 변경
  app.querySelector('#btn-chpw')?.addEventListener('click',async()=>{
    const old=(app.querySelector('#old-pw')||{value:''}).value;
    const n1=(app.querySelector('#new-pw1')||{value:''}).value;
    const n2=(app.querySelector('#new-pw2')||{value:''}).value;
    const err=app.querySelector('#chpw-err');
    if(!old||!n1||!n2){ err.textContent='모든 필드를 입력해 주세요.'; return; }
    if(n1!==n2){ err.textContent='새 비밀번호가 일치하지 않습니다.'; return; }
    if(n1.length<4){ err.textContent='4자 이상이어야 합니다.'; return; }
    err.textContent='확인 중...'; err.style.color='#F59E0B';
    const ok=await verifyPw(old,localStorage.getItem(HKEY));
    if(!ok){ err.textContent='현재 비밀번호가 올바르지 않습니다.'; err.style.color='#EF4444'; return; }
    const h=await hashPw(n1);
    localStorage.setItem(HKEY,h);
    err.textContent='✅ 변경 완료!'; err.style.color='#15803D';
    setTimeout(()=>{ view='main'; render(); },700);
  });
}

// ── 시작 ──
render();
</script>
</body>
</html>
